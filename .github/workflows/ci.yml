# Argos CI — runs the test suite on every push and pull request.
#
# Installs the SDK (editable) so `import argos` resolves, then runs pytest.
# As more components land in later phases, add their install/test steps here.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the SDK, backend, and test dependencies
        # Both packages are installed editable (-e) so `import argos` and
        # `import backend...` resolve from anywhere — independent of pytest's
        # rootdir. The backend was previously only getting its *dependencies*
        # (requirements.txt), never the package itself, so collection failed.
        run: |
          python -m pip install --upgrade pip
          pip install -e "sdk[dev,kafka]"
          pip install -e "backend[dev]"

      - name: Run pytest
        # Unit tests only; the integration test is skipped unless
        # ARGOS_INTEGRATION=1 (it needs a live Kafka + ClickHouse).
        run: pytest sdk/tests backend/tests -v
