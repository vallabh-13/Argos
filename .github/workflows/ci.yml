# Argos CI — runs the test suite on every push and pull request.
#
# Phase 0: this only runs a trivial placeholder test so the build is green
# from commit one. Real SDK / backend tests arrive in later phases and will be
# picked up automatically by pytest below.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pytest
        run: pytest -v
