# Argos local stack — Phase 2: Kafka (ingestion buffer) + ClickHouse (storage).
#
#   app (Argos SDK) --> Kafka topic "argos.spans" --> consumer --> ClickHouse
#
# Bring it up with:   docker compose up -d
# The consumer and demo run on your host (Phase 2); they're containerized later.
#
# Data survives restarts because each service writes to a NAMED VOLUME (declared
# at the bottom). `docker compose restart` or `down`+`up` keeps them; only
# `docker compose down -v` wipes them.

services:
  # ── Kafka — single broker in KRaft mode (no Zookeeper) ──────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: argos-kafka
    ports:
      # Host programs (SDK, consumer) connect here:
      - "29092:29092"
    environment:
      # --- KRaft: this one node is both broker and controller ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Fixed cluster id so the persisted volume stays valid across restarts.
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

      # --- THE LISTENER GOTCHA (read this if connections fail) ---
      # Two ways in: containers on this Docker network use PLAINTEXT://kafka:9092;
      # your host uses PLAINTEXT_HOST://localhost:29092. A client must be told the
      # address it can actually reach — that's what ADVERTISED_LISTENERS does.
      #
      # NOTE the empty host form "://:9092" (NOT "0.0.0.0"). Empty still binds all
      # interfaces, but Kafka 3.9's storage-format step validates advertised
      # listeners and rejects the literal 0.0.0.0 as "nonroutable"; the empty form
      # auto-resolves to the hostname instead and passes.
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # --- single-node replication settings (must be 1; we have one broker) ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      # Broker is ready once it can answer an admin API call.
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── ClickHouse — column store for assembled spans ───────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: argos-clickhouse
    environment:
      # These create the database + user on FIRST boot, and MUST match the
      # defaults in backend/storage/clickhouse.py::get_client(). Same env var
      # names on both sides, so one .env file (or shell export) can drive both.
      # IMPORTANT: only applied when the data volume is empty — see note below.
      CLICKHOUSE_DB: "${CLICKHOUSE_DB:-argos}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-argos}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-argos}"
    ports:
      - "8123:8123"   # HTTP interface (clickhouse-connect uses this)
      - "9000:9000"   # native protocol (clickhouse-client)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # Auto-create the argos.spans table on first boot (runs only when the data
      # volume is empty). This is how the schema gets applied with no manual step.
      - ./backend/storage/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Prometheus — scrapes the detection exporter's /metrics ──────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: argos-prometheus
    ports:
      - "9090:9090"   # Prometheus UI / query API
    volumes:
      # Scrape config (read-only). See the file's header for the host-scrape note.
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      # Lets the container reach the detection exporter running on the host via
      # host.docker.internal (needed on Linux; harmless on Docker Desktop).
      - "host.docker.internal:host-gateway"

# Named volumes = the data that survives restarts. Listed in .gitignore's spirit
# (Docker manages them outside the repo).
volumes:
  kafka-data:
  clickhouse-data:
  prometheus-data:
